# Cortex memory service + dashboard frontend.
#
# ARCHITECTURE NOTE
# -----------------
# Hermes is NOT containerized here. Install it natively on the host (one
# `hermes-gateway-*` systemd service per profile, plus `hermes-dashboard`)
# per `docs/superpowers/specs/2026-05-25-host-native-hermes-multi-agent-design.md`.
# The containers below reach the host's Hermes via `host.docker.internal`,
# which requires `extra_hosts: ["host.docker.internal:host-gateway"]` on Linux
# (Docker >= 20.10).
#
# SETUP
# -----
# 1. `cp .env.example .env` and set HERMES_GATEWAY_KEY (must match the host's
#    `~/.hermes/.env` API_SERVER_KEY, and any per-profile .env's of the same).
# 2. Install Hermes on the host and start its gateway services (see the spec).
# 3. Set AGENTS_JSON below to the list of agents your install exposes.
# 4. `docker compose up -d`

services:
  cortex:
    image: justnorthow/ollie-hermes-cortex:latest
    container_name: cortex
    restart: unless-stopped
    ports:
      # Bind to host loopback only. The host-native Hermes cortex plugin reaches
      # cortex at http://localhost:9120, and nginx in the dashboard container
      # reaches it over the Docker network as http://cortex:9120 — neither needs
      # the port published on 0.0.0.0. Publishing it publicly exposed an
      # unauthenticated API (read/wipe memories, overwrite brain files, trigger
      # paid discovery jobs) to the internet.
      - "127.0.0.1:9120:9120"
    volumes:
      - cortex-data:/data
      - cortex-plugin:/plugin
    environment:
      - DATA_DIR=/data
      # Cortex talks to the default profile's gateway for memory extraction.
      # Multi-agent cortex routing is a follow-up.
      - HERMES_GATEWAY_URL=http://host.docker.internal:8642
      - HERMES_GATEWAY_KEY=${HERMES_GATEWAY_KEY}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      # Brain Discovery: web crawl needs a Firecrawl API key (uploads work without it).
      # Tunables have sensible defaults in code; override here if needed.
      - FIRECRAWL_API_KEY=${FIRECRAWL_API_KEY:-}
      - DISCOVERY_MAX_PAGES=${DISCOVERY_MAX_PAGES:-10}
      - DISCOVERY_MAX_UPLOAD_MB=${DISCOVERY_MAX_UPLOAD_MB:-10}
      - DISCOVERY_MAX_TOTAL_MB=${DISCOVERY_MAX_TOTAL_MB:-50}
      - DISCOVERY_SCRAPE_TIMEOUT=${DISCOVERY_SCRAPE_TIMEOUT:-60}
    extra_hosts:
      - "host.docker.internal:host-gateway"

  oauth2-proxy:
    image: quay.io/oauth2-proxy/oauth2-proxy:v7.6.0
    container_name: oauth2-proxy
    restart: unless-stopped
    profiles: ["oauth"]            # only runs when Fleet enables OAuth
    # Not published — only the dashboard's nginx reaches it over the compose network.
    environment:
      - OAUTH2_PROXY_HTTP_ADDRESS=0.0.0.0:4180
      - OAUTH2_PROXY_REVERSE_PROXY=true
      - OAUTH2_PROXY_SET_XAUTHREQUEST=true
      - OAUTH2_PROXY_SKIP_PROVIDER_BUTTON=true
      - OAUTH2_PROXY_UPSTREAMS=static://202
      - OAUTH2_PROXY_COOKIE_SECURE=${DASHBOARD_PUBLIC_HTTPS:-true}
      - OAUTH2_PROXY_PROVIDER=${OAUTH2_PROXY_PROVIDER:-google}
      - OAUTH2_PROXY_CLIENT_ID=${OAUTH2_PROXY_CLIENT_ID:-}
      - OAUTH2_PROXY_CLIENT_SECRET=${OAUTH2_PROXY_CLIENT_SECRET:-}
      - OAUTH2_PROXY_COOKIE_SECRET=${OAUTH2_PROXY_COOKIE_SECRET:-}
      - OAUTH2_PROXY_REDIRECT_URL=${OAUTH2_PROXY_REDIRECT_URL:-}
      - OAUTH2_PROXY_EMAIL_DOMAINS=${OAUTH2_PROXY_EMAIL_DOMAINS:-*}
      - OAUTH2_PROXY_AUTHENTICATED_EMAILS_FILE=${OAUTH2_PROXY_AUTHENTICATED_EMAILS_FILE:-}
      - OAUTH2_PROXY_CUSTOM_TEMPLATES_DIR=/etc/oauth2-proxy/templates
    volumes:
      - ./oauth2-emails:/etc/oauth2-proxy/emails:ro
      - ./oauth2-templates:/etc/oauth2-proxy/templates:ro

  dashboard:
    image: justnorthow/ollie-hermes-frontend:latest
    container_name: ollie-dashboard
    restart: unless-stopped
    depends_on:
      oauth2-proxy:
        condition: service_started
        # Soft dependency: oauth2-proxy lives in the "oauth" profile, so when
        # OAuth is disabled the service is inactive. required:false lets the
        # dashboard (always active) reference it without erroring in that case;
        # when the profile is enabled, nginx still starts after the proxy.
        required: false
    ports:
      # Bind to host loopback by default. The dashboard is meant to be reached
      # through a TLS reverse-proxy / Cloudflare tunnel terminating on the host
      # (cloudflared dials localhost:3000), so it does NOT need to be published
      # on 0.0.0.0. Publishing it publicly exposed the dashboard (basic-auth over
      # cleartext HTTP, bypassing the tunnel) to internet IP-scanners. Override
      # with DASHBOARD_BIND=0.0.0.0 only for a dev box with no proxy in front.
      - "${DASHBOARD_BIND:-127.0.0.1}:3000:3000"
    environment:
      - BACKEND=hermes
      - HERMES_GATEWAY_KEY=${HERMES_GATEWAY_KEY}
      # Front-door HTTP Basic Auth. Set both to require login at the dashboard.
      # When unset the dashboard is open (container logs a warning at startup).
      - DASHBOARD_USER=${DASHBOARD_USER:-}
      - DASHBOARD_PASS=${DASHBOARD_PASS:-}
      # Bearer token for the host-native ollie-hermes-orchestrator service on
      # :9123 (used by the dashboard's "+ New agent" management UI). When
      # unset the nginx /orchestrator-proxy/ block emits a 503 and the UI
      # gracefully hides agent management.
      - ORCHESTRATOR_KEY=${ORCHESTRATOR_KEY:-}
      # Base origin of the central Home Inspection Advisor app (e.g. its Railway
      # URL). When set, the container's generate-nginx.sh adds an /apps/hia/
      # proxy to it so the embedded HIA tile loads same-origin. Unset = no proxy.
      - HIA_BASE_URL=${HIA_BASE_URL:-}
      # Browser-facing HTTPS URL of the native Hermes dashboard, used by the
      # frontend's "Backend Settings" link. Leave unset and the link falls back
      # to http://<host>:9119 — which HTTPS-First browsers refuse, producing
      # ERR_SSL_PROTOCOL_ERROR. Point this at a TLS reverse-proxy to the
      # dashboard, e.g. https://ollie.example.com:9443.
      - HERMES_UI_URL=${HERMES_UI_URL:-}
      # One entry per agent on the host. `gatewayUrl` is the agent's Hermes
      # Gateway (browser → /gateway-proxy/<id>/* → nginx → gatewayUrl).
      # `dashboardUrl` is the agent's Hermes Dashboard (each profile has its
      # own dashboard service scoped to its own sessions DB). The browser hits
      # the nginx proxy paths, NOT these URLs directly. To list sessions
      # across profiles, the frontend queries each agent's dashboard.
      - AGENTS_JSON=${AGENTS_JSON:-[{"id":"default","name":"Ollie","gatewayUrl":"http://host.docker.internal:8642","dashboardUrl":"http://host.docker.internal:9119"}]}
      # OAuth activation vars, read by generate-auth.sh INSIDE this container to
      # decide whether to enter OAuth mode (proxy /oauth2/ to the oauth2-proxy
      # service). Set by Fleet when it enables OAuth; the oauth2-proxy service
      # keeps its own copies of the full OAuth config above.
      - OAUTH2_PROXY_CLIENT_ID=${OAUTH2_PROXY_CLIENT_ID:-}
      - OAUTH2_PROXY_PROVIDER=${OAUTH2_PROXY_PROVIDER:-google}
      # Supabase cookie-gate auth (Fleet's canonical mode). generate-config.sh
      # writes these into config.js; generate-auth.sh emits the Supabase gate
      # (auth_request /supabase-validate) when SUPABASE_URL is set. The anon key
      # is public by design (shipped to the browser). Set by Fleet on Apply.
      - SUPABASE_URL=${SUPABASE_URL:-}
      - SUPABASE_ANON_KEY=${SUPABASE_ANON_KEY:-}
    volumes:
      # Persist user uploads (e.g. the agent avatar saved to /uploads/avatar.jpg
      # by /save-avatar) across container recreation. Without this, /uploads
      # lives in the container's ephemeral layer and is wiped on every
      # `docker compose up -d`, leaving the dashboard pointing at a now-404
      # avatar URL stored in the browser's localStorage.
      - uploads-data:/uploads
    extra_hosts:
      - "host.docker.internal:host-gateway"

volumes:
  cortex-data:
  cortex-plugin:
  uploads-data:
