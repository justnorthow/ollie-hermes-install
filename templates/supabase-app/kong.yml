_format_version: "2.1"

consumers:
  - username: anon
    keyauth_credentials:
      - key: __ANON_KEY__
  - username: service_role
    keyauth_credentials:
      - key: __SERVICE_ROLE_KEY__

acls:
  - consumer: anon
    group: anon
  - consumer: service_role
    group: admin

services:
  - name: auth-v1
    url: http://auth:9999/
    routes:
      - name: auth-v1
        strip_path: true
        paths: ["/auth/v1/"]
    plugins:
      - name: cors

  - name: rest-v1
    url: http://rest:3000/
    routes:
      - name: rest-v1
        strip_path: true
        paths: ["/rest/v1/"]
    plugins:
      - name: cors
      - name: key-auth
        config:
          key_names: ["apikey"]
          hide_credentials: true
      - name: acl
        config:
          hide_groups_header: true
          allow: ["admin", "anon"]

  - name: storage-v1
    url: http://storage:5000/
    routes:
      - name: storage-v1
        strip_path: true
        paths: ["/storage/v1/"]
    plugins:
      - name: cors

  - name: realtime-v1-ws
    url: http://realtime-dev.supabase-realtime:4000/socket
    routes:
      - name: realtime-v1-ws
        strip_path: true
        paths: ["/realtime/v1/"]
    plugins:
      - name: cors
      - name: key-auth
        config:
          key_names: ["apikey"]
          hide_credentials: false
      - name: acl
        config:
          hide_groups_header: true
          allow: ["admin", "anon"]
